<!DOCTYPE html>
<html>
<head>
  <title>Country Check</title>
  <script>
    async function checkCountry() {
      try {
        const response = await fetch("https://ipinfo.io/json?token=YOUR_TOKEN"); 
        const data = await response.json();
        const country = data.country; // ISO code like "BD" or "US"

        // Example: detect duplicate Chrome accounts (basic heuristic)
        const userAgent = navigator.userAgent;
        const isChrome = userAgent.includes("Chrome");
        const isDuplicateProfile = localStorage.getItem("visitedBefore");

        if (isChrome && isDuplicateProfile) {
          // Redirect if duplicate Chrome account/profile detected
          window.location.href = "https://panelopenionbd.github.io/Surveys/fail";
          return;
        }

        // Mark that this browser has visited before
        localStorage.setItem("visitedBefore", "true");

        if (country === "BD") {
          // Redirect Bangladesh visitors to Google Form
          window.location.href = "https://docs.google.com/forms/d/e/1FAIpQLSdz63I2Ovuy3UHOVMGaeStsTuDkAKUzu5EeMml4ROCwAIczLg/viewform?fbzx=-575721671062863830";
        } else if (country === "US") {
          // Redirect US visitors to Trayistats link
          window.location.href = "https://success.trayistats.com/?113=1&122=3&15297=4&2189=1&42=45&43=1&45=20011&47=1&5729=48&61076=20&96=9&97=511&RPI=1.225&UID=076e0604-af81-44fa-a1b5-75875d983786&l=20&mid=26943879&pid=9494596&sur=74673205&hash=JXtuKMTSvCYUzBc2d20LqGZW5dA";
        } else {
          // Fallback for other countries
          window.location.href = "fail.html";
        }
      } catch (error) {
        console.error("Error fetching country:", error);
        window.location.href = "fail.html";
      }
    }
    window.onload = checkCountry;
  </script>
</head>
<body>
  <p>Checking your country… please wait.</p>
</body>
</html>
