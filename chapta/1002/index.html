<!DOCTYPE html>
<html>
<head>
  <title>CAPTCHA Verification</title>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 100px;
      background-color: #f8f8f8;
    }
    h2 { color: #2c3e50; }
    .captcha-box {
      display: inline-block;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      margin-top: 20px;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: #3498db;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #2980b9; }
  </style>
</head>
<body>
  <h2>🔒 CAPTCHA Verification</h2>
  <p>Please complete the reCAPTCHA below to continue.</p>

  <div class="captcha-box">
    <!-- Replace YOUR_SITE_KEY with your actual reCAPTCHA site key -->
    <div class="g-recaptcha" data-sitekey="6LfRE4ssAAAAAA7gGS8ibzMUzuo3rmIrGEgc5xeB"></div>
    <button onclick="verifyCaptcha()">Continue</button>
  </div>

  <script>
    function verifyCaptcha() {
      // Check if reCAPTCHA is completed
      var response = grecaptcha.getResponse();
      if(response.length === 0) {
        alert("❌ Please complete the CAPTCHA.");
      } else {
        // ✅ Redirect to your verification page
        window.location.href = "https://samplicio-us-ai.github.io/verification.aspx/eyetracking/1002/";
      }
    }
  </script>
</body>
</html>
