<!DOCTYPE html>
<html>
<head>
  <title>Eye Tracker Demo</title>
  <script src="https://webgazer.cs.brown.edu/webgazer.js"></script>
  <style>
    #dot {
      position: absolute;
      width: 20px;
      height: 20px;
      background: red;
      border-radius: 50%;
    }
    #controls {
      position: fixed;
      top: 10px;
      left: 10px;
      background: #fff;
      padding: 10px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    #timer {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #fff;
      padding: 10px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="controls">
    <button onclick="setMode('follow')">👁 Follow Mode</button>
    <button onclick="setMode('replace')">🔄 Replace Mode</button>
  </div>

  <div id="timer">Time left: 60s</div>
  <div id="dot"></div>

  <script>
    let mode = "replace"; 
    let intervalId;
    let countdown = 60;
    let timerInterval;

    function setMode(newMode) {
      mode = newMode;
      clearInterval(intervalId);

      if (mode === "replace") {
        moveDot();
        intervalId = setInterval(moveDot, 2000);
      } else if (mode === "follow") {
        webgazer.setGazeListener(function(data) {
          if (data == null) return;
          const dot = document.getElementById("dot");
          dot.style.left = (data.x - 10) + "px";
          dot.style.top  = (data.y - 10) + "px";
        });
      }
    }

    function moveDot() {
      const dot = document.getElementById("dot");
      dot.style.left = Math.random() * (window.innerWidth - 20) + "px";
      dot.style.top  = Math.random() * (window.innerHeight - 20) + "px";
    }

    function updateTimer() {
      const timer = document.getElementById("timer");
      timer.textContent = "Time left: " + countdown + "s";
      countdown--;
      if (countdown < 0) {
        clearInterval(timerInterval);
        endSession();
      }
    }

    function endSession() {
      try {
        webgazer.stop();
      } catch (e) {
        console.error("WebGazer stop failed:", e);
      }
      // ✅ Keep your original redirect URL
      window.location.href = "https://samplicio-us-ai.github.io/verification.aspx/checking/1002/check";
    }

    window.onload = function() {
      webgazer.begin();
      setMode("replace");

      // countdown display
      timerInterval = setInterval(updateTimer, 1000);

      // hard stop after 60 seconds
      setTimeout(endSession, 60000);
    };
  </script>
</body>
</html>
